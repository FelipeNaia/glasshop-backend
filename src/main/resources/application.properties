spring.data.mongodb.uri=mongodb://admin:admin@localhost:27017/productcatalog?authSource=admin
spring.data.mongodb.database=productcatalog
app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT signing secret (HS256 needs >= 32 bytes) - override via env var in real deployments
app.jwt.secret=${JWT_SECRET:dev-only-secret-change-me-dev-only-secret-change-me}
app.jwt.access-token-ttl-minutes=15
